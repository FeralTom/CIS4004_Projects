<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body onload="checkLogin(); loadContacts();">

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Contacts</h2>

        <button
            class="btn btn-secondary"
            onclick="doLogout();">
            Logout
        </button>
    </div>

    <!-- Add Contact -->

    <div class="card p-4 mb-4">

        <h4 class="mb-3">Add Contact</h4>

        <div class="row g-3">

            <div class="col-md-3">
                <input
                    type="text"
                    id="contactFirstName"
                    class="form-control"
                    placeholder="First Name">
            </div>

            <div class="col-md-3">
                <input
                    type="text"
                    id="contactLastName"
                    class="form-control"
                    placeholder="Last Name">
            </div>

            <div class="col-md-3">
                <input
                    type="email"
                    id="contactEmail"
                    class="form-control"
                    placeholder="Email">
            </div>

            <div class="col-md-3">
                <input
                    type="text"
                    id="contactPhone"
                    class="form-control"
                    placeholder="Phone Number">
            </div>

        </div>

        <div class="mt-3">
            <button
                class="btn btn-success"
                onclick="addContact();">
                Add Contact
            </button>
        </div>

    </div>

    <!-- Search -->

    <div class="card p-4 mb-4">

        <h4 class="mb-3">Search Contacts</h4>

        <div class="input-group">

            <input
                type="text"
                id="searchText"
                class="form-control"
                placeholder="Search by first or last name">

            <button
                class="btn btn-primary"
                onclick="searchContacts();">
                Search
            </button>

            <button
                class="btn btn-outline-secondary"
                onclick="loadContacts();">
                Show All
            </button>

        </div>

    </div>

    <!-- Contact Table -->

    <div class="card p-4">

        <h4 class="mb-3">My Contact List</h4>

        <div class="table-responsive">

            <table class="table table-striped table-bordered">

                <thead>

                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody id="contactTableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/code.js?v=3"></script>

</body>
</html>
